name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            
            # Navigate to the project directory
            cd ~/aescion-project
            
            # Stash any local changes (generated files like dist/, package-lock.json)
            git stash --include-untracked || true
            
            # Pull the latest changes from GitHub
            git pull origin main
            
            # --------------------------
            # 1. Update & Restart Backend
            # --------------------------
            cd Backend
            npm install
            npx prisma generate
            npm run build
            pm2 restart ecosystem.config.js
            
            # --------------------------
            # 2. Update & Restart Frontend
            # --------------------------
            cd ../Frontend
            
            # Clean everything for a fresh build
            rm -rf node_modules
            rm -rf website/.next
            rm -rf website/node_modules
            npm install
            
            # Build the website
            npm run build:website
            
            # Verify build output exists
            if [ ! -d "website/.next" ]; then
              echo "ERROR: Build failed - .next directory not found!"
              exit 1
            fi
            
            # Restart the frontend (stop first, then start fresh)
            pm2 delete aescion-website || true
            cd website
            pm2 start npm --name "aescion-website" -- start
