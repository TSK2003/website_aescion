name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            echo "=== Starting Deployment ==="

            # Navigate to the project directory
            cd ~/aescion-project

            # Stash any local changes (generated files)
            git stash --include-untracked || true

            # Pull the latest changes from GitHub
            git pull origin main
            echo "=== Git pull complete ==="

            # --------------------------
            # 1. Update & Build Backend
            # --------------------------
            cd Backend
            npm install
            npx prisma generate
            npm run build
            echo "=== Backend build complete ==="

            # --------------------------
            # 2. Update & Build Frontend
            # --------------------------
            cd ../Frontend

            # Clean old dependencies and build cache
            rm -rf node_modules website/node_modules website/.next
            npm install

            # Build the website
            npm run build:website
            echo "=== Frontend build complete ==="

            # Verify build output
            ls -la website/.next/ || { echo "ERROR: .next directory missing!"; exit 1; }
            echo "Build ID:"
            cat website/.next/BUILD_ID

            # --------------------------
            # 3. Restart all services via ecosystem config
            # --------------------------
            cd ../Backend
            pm2 delete all || true
            pm2 start ecosystem.config.js
            pm2 save
            echo "=== PM2 restart complete ==="

            # Show PM2 status for verification
            pm2 list
